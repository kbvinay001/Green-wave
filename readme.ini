# Green Wave++ 🚑🚦

A certainty-aware emergency vehicle preemption system using audio-visual fusion.

## Overview
Green Wave++ detects approaching emergency vehicles using:
- **Audio**: CRNN on log-mel spectrograms for siren detection
- **Vision**: YOLOv11 for ambulance detection
- **Direction**: GCC-PHAT TDOA on microphone array
- **Fusion**: Temporal confidence fusion with hysteresis
- **Prediction**: Map-matching and green wave coordination
- **Simulation**: SUMO + TraCI integration

## Project Structure
```
greenwave/
├── audio/          # Siren detection models
├── vision/         # YOLOv11 ambulance detection
├── fusion/         # Multi-modal fusion logic
├── sim/            # SUMO simulation
├── ui/             # Demo dashboard
└── common/         # Shared utilities
```

